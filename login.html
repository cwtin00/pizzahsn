<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Pizza HSN Giriş</title>

<link rel="stylesheet"
href="login.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
rel="stylesheet">

</head>

<body>


<div class="login-container">

    <div class="login-card">

        <div class="logo">
            🍕
        </div>

        <h1>
            Pizza HSN
        </h1>

        <span>
            Yönetim Paneli Girişi
        </span>


        <input
        type="email"
        id="email"
        placeholder="Mail Adresi">


        <input
        type="password"
        id="password"
        placeholder="Şifre">


        <button id="login-btn">

            Giriş Yap

        </button>


        <p id="error-text"></p>

    </div>

</div>


<script type="module"
src="login.js"></script>

</body>
</html>
